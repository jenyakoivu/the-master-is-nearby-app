<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Кабинет мастера — Техник Рядом</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --card: var(--tg-theme-secondary-bg-color, #f1f3f5);
    --ink: var(--tg-theme-text-color, #1a1a1a);
    --ink-dim: var(--tg-theme-hint-color, #8a9aa5);
    --accent: var(--tg-theme-button-color, #2bb6a8);
    --accent-ink: var(--tg-theme-button-text-color, #ffffff);
    --link: var(--tg-theme-link-color, #2b8ab6);
    --green: #1a9d4f; --orange: #d98a00; --red: #d83a2e; --blue: #2b7fd9;
    --edge: rgba(128,128,128,.22); --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--ink); min-height: 100vh; padding: 16px 14px 40px; -webkit-font-smoothing: antialiased; }
  .head { display: flex; align-items: center; gap: 11px; margin-bottom: 16px; }
  .head .logo { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, #2bb6a8, #1c8a80);
    display: grid; place-items: center; font-size: 21px; flex-shrink: 0; box-shadow: 0 6px 16px rgba(43,182,168,.3); }
  .head h1 { font-size: 18px; font-weight: 700; }
  .head p { font-size: 12px; color: var(--ink-dim); margin-top: 1px; }
  .tabs { display: flex; gap: 6px; margin-bottom: 16px; background: var(--card); padding: 5px; border-radius: 13px; }
  .tab { flex: 1; text-align: center; padding: 9px; border-radius: 9px; font-size: 14px; font-weight: 600;
    color: var(--ink-dim); cursor: pointer; border: none; background: none; font-family: inherit; }
  .tab.active { background: var(--accent); color: var(--accent-ink); }
  .sub { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--ink-dim); margin: 18px 4px 10px; }
  .sub:first-child { margin-top: 0; }
  .card { background: var(--card); border: 1px solid var(--edge); border-radius: var(--radius);
    padding: 14px 15px 13px; margin-bottom: 11px; position: relative; overflow: hidden; animation: drop .35s ease both; }
  .card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; }
  .card.new::before { background: var(--green); }
  .card.taken::before { background: var(--orange); }
  .card.done::before { background: var(--blue); }
  .card.canceled::before { background: var(--red); }
  .top { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 8px; }
  .num { font-size: 14px; font-weight: 700; }
  .badge { font-size: 10px; font-weight: 700; padding: 4px 9px; border-radius: 999px; white-space: nowrap; }
  .badge.new { background: rgba(26,157,79,.16); color: var(--green); }
  .badge.taken { background: rgba(217,138,0,.18); color: var(--orange); }
  .badge.done { background: rgba(43,127,217,.16); color: var(--blue); }
  .badge.canceled { background: rgba(216,58,46,.16); color: var(--red); }
  .problem { font-size: 15px; font-weight: 600; margin-bottom: 8px; line-height: 1.3; }
  .meta { display: flex; flex-direction: column; gap: 4px; }
  .meta .row { display: flex; gap: 7px; font-size: 13px; color: var(--ink-dim); align-items: flex-start; }
  .meta .row .i { width: 16px; text-align: center; flex-shrink: 0; }
  .meta .row a { color: var(--link); text-decoration: none; }
  .actions { display: flex; gap: 8px; margin-top: 12px; }
  .btn { flex: 1; border: none; border-radius: 11px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn.take { background: var(--accent); color: var(--accent-ink); }
  .btn.done { background: var(--green); color: #fff; }
  .btn.release { background: transparent; color: var(--ink-dim); border: 1.5px solid var(--edge); }
  .btn:active { opacity: .8; }
  .state { text-align: center; padding: 50px 20px; color: var(--ink-dim); }
  .state .ico { font-size: 44px; margin-bottom: 12px; }
  .btn-clear { display: block; width: 100%; margin: 22px 0 0; padding: 13px;
    background: none; border: 1.5px solid var(--edge); border-radius: 12px;
    color: var(--ink-dim); font-size: 14px; font-weight: 600;
    font-family: inherit; cursor: pointer; }
  .btn-clear:active { opacity: .7; }
  @keyframes drop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div class="head"><div class="logo">🧰</div><div><h1>Кабинет мастера</h1><p>Техник Рядом</p></div></div>
  <div class="tabs">
    <button class="tab active" id="tabBoard" onclick="switchTab('board')">📋 Доска заявок</button>
    <button class="tab" id="tabMine" onclick="switchTab('mine')">🧑‍🔧 Мои заявки</button>
  </div>
  <div id="content"><div class="state"><div class="ico">⏳</div>Загрузка…</div></div>
<script>
  const tg = window.Telegram ? window.Telegram.WebApp : null;
  if (tg) { tg.ready(); tg.expand(); }

  // Тап по пустому месту убирает фокус с поля и закрывает клавиатуру
  document.addEventListener("pointerdown", function(e){
    const t = e.target;
    const isInput = t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.tagName === "SELECT";
    const isButton = t.tagName === "BUTTON" || (t.closest && t.closest("button"));
    if(!isInput && !isButton && document.activeElement &&
       (document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA")){
      document.activeElement.blur();
    }
  });

  const API = "https://138.124.54.85.nip.io/api";
  const initData = tg ? tg.initData : "";
  const content = document.getElementById("content");
  const statusBadge = { new:"Открыта", taken:"В работе", done:"Выполнена", canceled:"Отменена клиентом" };
  let current = "board";

  function esc(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
  function st(ico,t){ content.innerHTML = '<div class="state"><div class="ico">'+ico+'</div>'+t+'</div>'; }
  async function api(p,o){ const r=await fetch(API+p,o); if(!r.ok) throw new Error(r.status); return r.json(); }

  window.switchTab = function(t){
    current=t;
    document.getElementById("tabBoard").classList.toggle("active", t==="board");
    document.getElementById("tabMine").classList.toggle("active", t==="mine");
    if(t==="board") loadBoard(); else loadMine();
  };

  function contactRows(r){
    let h='';
    if(r.phone){ h+='<div class="row"><span class="i">📞</span><a href="tel:'+esc(r.phone)+'">'+esc(r.phone)+'</a></div>'; }
    if(r.username){ h+='<div class="row"><span class="i">👤</span><a href="https://t.me/'+esc(r.username)+'">@'+esc(r.username)+'</a></div>'; }
    else if(r.full_name){ h+='<div class="row"><span class="i">👤</span>'+esc(r.full_name)+'</div>'; }
    return h;
  }
  function baseRows(r){
    return '<div class="row"><span class="i">📍</span><span>'+esc(r.district)+', '+esc(r.address)+'</span></div>'+
           '<div class="row"><span class="i">⏱</span><span>'+esc(r.urgency)+'</span></div>';
  }
  function cardHead(r){
    return '<div class="top"><span class="num">Заявка №'+r.id+'</span>'+
           '<span class="badge '+r.status+'">'+(statusBadge[r.status]||r.status)+'</span></div>'+
           '<div class="problem">'+esc(r.problem)+'</div>';
  }

  async function loadBoard(){
    st("⏳","Загрузка…");
    try {
      const d=await api("/m/board?initData="+encodeURIComponent(initData));
      if(!d.requests.length){ st("📭","Свободных заявок нет.<br>Новые появятся здесь автоматически."); return; }
      content.innerHTML = d.requests.map(r=>'\
        <div class="card '+r.status+'">'+cardHead(r)+'<div class="meta">'+baseRows(r)+'</div>\
        <div class="actions"><button class="btn take" onclick="act('+r.id+',\'take\')">✋ Взять в работу</button></div></div>').join("");
    } catch(e){ st("⚠️", e.message==="401" ? "Доступ только для мастеров." : "Нет связи с сервером."); }
  }

  async function loadMine(){
    st("⏳","Загрузка…");
    try {
      const d=await api("/m/mine?initData="+encodeURIComponent(initData));
      let h="";
      h+='<div class="sub">В работе ('+d.active.length+')</div>';
      if(!d.active.length){ h+='<div class="state" style="padding:24px"><div class="ico">🔧</div>Нет заявок в работе.</div>'; }
      else h+=d.active.map(r=>'\
        <div class="card '+r.status+'">'+cardHead(r)+'<div class="meta">'+baseRows(r)+contactRows(r)+'</div>\
        <div class="actions"><button class="btn done" onclick="act('+r.id+',\'complete\')">✅ Выполнено</button>\
        <button class="btn release" onclick="act('+r.id+',\'release\')">🔄 Передать</button></div></div>').join("");
      h+='<div class="sub">История ('+d.history.length+')</div>';
      if(!d.history.length){ h+='<div class="state" style="padding:24px"><div class="ico">📁</div>История пуста.</div>'; }
      else {
        h+=d.history.map(r=>'<div class="card '+r.status+'">'+cardHead(r)+'<div class="meta">'+baseRows(r)+'</div></div>').join("");
        h+='<button class="btn-clear" onclick="clearHistory()">🗑 Очистить историю</button>';
      }
      content.innerHTML=h;
    } catch(e){ st("⚠️", e.message==="401" ? "Доступ только для мастеров." : "Нет связи с сервером."); }
  }

  window.act = async function(id, action){
    if(action==="release" && tg && tg.showConfirm){
      const ok=await new Promise(res=>tg.showConfirm("Передать заявку №"+id+" другим мастерам?",res));
      if(!ok) return;
    }
    try {
      await api("/m/action",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({initData,id,action})});
      if(tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
      if(current==="board") loadBoard(); else loadMine();
    } catch(e){ if(tg) tg.showAlert("Не удалось выполнить действие. Обновите и попробуйте снова."); }
  };

  window.clearHistory = async function(){
    if(!(tg && tg.showConfirm)){
      if(!confirm("Вы уверены? История будет очищена.")) return;
    } else {
      const ok = await new Promise(res=>tg.showConfirm("Вы уверены? Вся история скроется из вашего списка, а связанные уведомления удалятся из чата.",res));
      if(!ok) return;
    }
    try {
      await api("/m/clear_history",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({initData})});
      if(tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
      loadMine();
    } catch(e){ if(tg) tg.showAlert("Не удалось очистить историю."); }
  };

  if(!initData) st("🔒","Откройте через кнопку в боте мастера.");
  else loadBoard();
</script>
</body>
</html>
