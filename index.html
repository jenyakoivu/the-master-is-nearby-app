<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Мои заявки — Мастер Рядом</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  /* Цвета берём из темы Telegram, с запасными значениями для светлой темы */
  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --card: var(--tg-theme-secondary-bg-color, #f1f3f5);
    --ink: var(--tg-theme-text-color, #1a1a1a);
    --ink-dim: var(--tg-theme-hint-color, #8a9aa5);
    --accent: var(--tg-theme-button-color, #2bb6a8);
    --accent-ink: var(--tg-theme-button-text-color, #ffffff);
    --link: var(--tg-theme-link-color, #2b8ab6);
    --green: #1a9d4f;
    --orange: #d98a00;
    --red: #d83a2e;
    --edge: rgba(128,128,128,.22);
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--ink); min-height: 100vh;
    padding: 18px 16px 40px; -webkit-font-smoothing: antialiased;
  }
  .head { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .head .logo {
    width: 44px; height: 44px; border-radius: 13px;
    background: linear-gradient(135deg, #2bb6a8, #1c8a80);
    display: grid; place-items: center; font-size: 22px;
    box-shadow: 0 6px 18px rgba(43,182,168,.3); flex-shrink: 0;
  }
  .head h1 { font-size: 19px; font-weight: 700; letter-spacing: -.3px; color: var(--ink); }
  .head p { font-size: 12px; color: var(--ink-dim); margin-top: 2px; }
  .back {
    background: none; border: none; color: var(--link); font-size: 16px;
    cursor: pointer; padding: 6px 0; margin-bottom: 10px; display: inline-flex; align-items: center; gap: 4px; font-weight: 500;
  }
  .count { font-size: 13px; color: var(--ink-dim); margin: 0 4px 12px; }
  .card {
    background: var(--card); border: 1px solid var(--edge);
    border-radius: var(--radius); padding: 15px 44px 14px 18px; margin-bottom: 12px;
    position: relative; overflow: hidden; cursor: pointer;
    animation: drop .4s ease both; transition: transform .12s;
  }
  .card:active { transform: scale(.985); }
  .card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; }
  .card.new::before { background: var(--green); }
  .card.taken::before { background: var(--orange); }
  .card .top { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 9px; }
  .card .num { font-size: 15px; font-weight: 700; color: var(--ink); }
  .badge { font-size: 11px; font-weight: 700; padding: 5px 11px; border-radius: 999px; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
  .badge.new { background: rgba(26,157,79,.16); color: var(--green); }
  .badge.taken { background: rgba(217,138,0,.18); color: var(--orange); }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .problem { font-size: 16px; font-weight: 600; margin-bottom: 9px; line-height: 1.3; color: var(--ink); }
  .meta { display: flex; flex-direction: column; gap: 5px; }
  .meta .row { display: flex; gap: 8px; font-size: 14px; color: var(--ink-dim); align-items: flex-start; }
  .meta .row .i { width: 18px; text-align: center; flex-shrink: 0; }
  .chev {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    color: var(--ink-dim); font-size: 30px; font-weight: 300; line-height: 1; opacity: .7;
  }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--ink-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px; }
  .field .val { font-size: 16px; font-weight: 500; color: var(--ink); }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--card); border: 1px solid var(--edge);
    border-radius: 12px; padding: 12px 14px; color: var(--ink); font-size: 16px;
    font-family: inherit; outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field input:disabled, .field select:disabled, .field textarea:disabled { opacity: .45; }
  .field textarea { resize: vertical; min-height: 70px; }
  .locked { font-size: 11px; color: var(--ink-dim); margin-top: 5px; }
  .btn {
    width: 100%; border: none; border-radius: 13px; padding: 15px;
    font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 10px;
  }
  .btn.primary { background: var(--accent); color: var(--accent-ink); }
  .btn.ghost { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
  .btn.danger { background: transparent; color: var(--red); border: 1.5px solid rgba(216,58,46,.5); }
  .btn:active { opacity: .8; }
  .state { text-align: center; padding: 60px 20px; color: var(--ink-dim); }
  .state .ico { font-size: 48px; margin-bottom: 14px; }
  .hint { font-size: 13px; color: var(--ink-dim); margin: -2px 4px 16px; line-height: 1.4; }
  @keyframes drop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div id="app"></div>
<script>
  const tg = window.Telegram ? window.Telegram.WebApp : null;
  if (tg) { tg.ready(); tg.expand(); }

  // Тап по пустому месту убирает фокус с поля и закрывает клавиатуру
  document.addEventListener("pointerdown", function(e){
    const t = e.target;
    const isInput = t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.tagName === "SELECT";
    const isButton = t.tagName === "BUTTON" || (t.closest && t.closest("button"));
    if(!isInput && !isButton && document.activeElement &&
       (document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA")){
      document.activeElement.blur();
    }
  });

  const API = "https://138.124.54.85.nip.io/api";
  const initData = tg ? tg.initData : "";
  const statusText = { new: "Ищем мастера", taken: "Мастер найден", done: "Выполнена", canceled: "Отменена" };
  const DISTRICTS = ["Индустриальный","Северный","Заягорбский","Зашекснинский","Пригород"];
  const URGENCIES = ["Срочно","Сегодня","В ближайшие дни"];
  let cache = [];
  const app = document.getElementById("app");

  function esc(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
  function header(sub){ return '<div class="head"><div class="logo">👷</div><div><h1>Мастер Рядом</h1><p>'+sub+'</p></div></div>'; }
  function state(ico, txt){ app.innerHTML = header("Мои заявки") + '<div class="state"><div class="ico">'+ico+'</div>'+txt+'</div>'; }

  async function api(path, opts){
    const r = await fetch(API + path, opts);
    if(!r.ok) throw new Error(r.status);
    return r.json();
  }
  async function loadList(){
    if(!initData){ state("🔒","Откройте страницу через кнопку в боте."); return; }
    state("⏳","Загружаем заявки…");
    try {
      const d = await api("/my_requests?initData=" + encodeURIComponent(initData));
      cache = d.requests || [];
      renderList();
    } catch(e){ state("⚠️","Нет связи с сервером. Попробуйте позже."); }
  }
  function renderList(){
    if(!cache.length){
      app.innerHTML = header("Мои заявки") +
        '<div class="state"><div class="ico">📭</div>У вас пока нет заявок.</div>' +
        '<button class="btn primary" onclick="openCreate()">➕ Оставить заявку</button>';
      return;
    }
    app.innerHTML = header("Мои заявки") +
      '<button class="btn primary" style="margin:0 0 14px" onclick="openCreate()">➕ Новая заявка</button>' +
      '<div class="count">Активных заявок: '+cache.length+'</div>' +
      cache.map(r => '\
        <div class="card '+r.status+'" onclick="openDetails('+r.id+')">\
          <div class="top">\
            <span class="num">Заявка №'+r.id+'</span>\
            <span class="badge '+r.status+'"><span class="dot"></span>'+(statusText[r.status]||r.status)+'</span>\
          </div>\
          <div class="problem">'+esc(r.problem)+'</div>\
          <div class="meta">\
            <div class="row"><span class="i">📍</span><span>— '+esc(r.district)+', '+esc(r.address)+'</span></div>\
            <div class="row"><span class="i">⏱</span><span>— '+esc(r.urgency)+'</span></div>\
          </div>\
          <span class="chev">›</span>\
        </div>').join("");
  }
  function statusLabel(r){
    if(r.status==="taken") return "✅ Нашли для вас мастера";
    if(r.status==="done") return "🏁 Заявка выполнена";
    if(r.status==="canceled") return "❌ Отменена";
    if(r.released_once) return "🔍 Ищем другого мастера";
    return "🔍 Ищем мастера";
  }
  window.openDetails = function(id){
    const r = cache.find(x => x.id === id);
    if(!r) return;
    app.innerHTML = header("Заявка №" + r.id) +
      '<button class="back" onclick="renderList()">‹ Назад</button>'+
      '<div class="field"><label>Статус</label><div class="val">'+statusLabel(r)+'</div></div>'+
      '<div class="field"><label>Проблема</label><div class="val">'+esc(r.problem)+'</div></div>'+
      '<div class="field"><label>Район</label><div class="val">'+esc(r.district)+'</div></div>'+
      '<div class="field"><label>Адрес</label><div class="val">'+esc(r.address)+'</div></div>'+
      '<div class="field"><label>Срочность</label><div class="val">'+esc(r.urgency)+'</div></div>'+
      '<div class="field"><label>Телефон</label><div class="val">'+esc(r.phone_show||r.phone)+'</div></div>'+
      '<button class="btn ghost" onclick="openEdit('+r.id+')">✏️ Редактировать</button>'+
      '<button class="btn danger" onclick="doDelete('+r.id+')">🗑 Удалить заявку</button>';
  };
  window.openEdit = function(id){
    const r = cache.find(x => x.id === id);
    if(!r) return;
    const taken = r.status === "taken";
    const dis = taken ? "disabled" : "";
    const lock = taken ? '<div class="locked">🔒 Можно менять только пока мастер не взял</div>' : "";
    app.innerHTML = header("Редактирование") +
      '<button class="back" onclick="openDetails('+r.id+')">‹ Назад</button>'+
      (taken ? '<div class="hint">Мастер уже взял заявку. Сейчас можно изменить только адрес и телефон.</div>' : "")+
      '<div class="field"><label>Проблема</label><textarea id="f_problem" '+dis+'>'+esc(r.problem)+'</textarea>'+lock+'</div>'+
      '<div class="field"><label>Район</label><select id="f_district" '+dis+'>'+
        DISTRICTS.map(d=>'<option '+(d===r.district?"selected":"")+'>'+d+'</option>').join("")+'</select>'+lock+'</div>'+
      '<div class="field"><label>Адрес</label><input id="f_address" value="'+esc(r.address)+'"></div>'+
      '<div class="field"><label>Срочность</label><select id="f_urgency" '+dis+'>'+
        URGENCIES.map(u=>'<option '+(u===r.urgency?"selected":"")+'>'+u+'</option>').join("")+'</select>'+lock+'</div>'+
      '<div class="field"><label>Телефон</label><input id="f_phone" value="'+esc(r.phone_show||r.phone)+'" inputmode="tel" oninput="maskPhone(this)"></div>'+
      '<button class="btn primary" id="saveBtn" onclick="doSave('+r.id+', '+taken+')">Сохранить</button>';
  };
  window.doSave = async function(id, taken){
    const btn = document.getElementById("saveBtn");
    btn.textContent = "Сохраняем…"; btn.disabled = true;
    const fields = taken
      ? { address: val("f_address"), phone: val("f_phone") }
      : { problem: val("f_problem"), district: val("f_district"), address: val("f_address"), urgency: val("f_urgency"), phone: val("f_phone") };
    try {
      const d = await api("/edit", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ initData, id, fields }) });
      const i = cache.findIndex(x=>x.id===id);
      if(i>=0 && d.request) cache[i] = d.request;
      if(tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
      openDetails(id);
    } catch(e){ btn.textContent = "Ошибка, попробуйте снова"; btn.disabled = false; }
  };
  window.doDelete = async function(id){
    const ok = (tg && tg.showConfirm)
      ? await new Promise(res => tg.showConfirm("Удалить заявку №"+id+"?", res))
      : confirm("Удалить заявку №"+id+"?");
    if(!ok) return;
    try {
      await api("/delete", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ initData, id }) });
      cache = cache.filter(x=>x.id!==id);
      if(tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
      renderList();
    } catch(e){ alert("Не удалось удалить. Попробуйте позже."); }
  };
  window.openCreate = function(){
    app.innerHTML = header("Новая заявка") +
      '<button class="back" onclick="renderList()">‹ Назад</button>'+
      '<div class="field"><label>Что случилось?</label><textarea id="c_problem" placeholder="Например: течёт труба под раковиной"></textarea></div>'+
      '<div class="field"><label>Район</label><select id="c_district">'+
        DISTRICTS.map(d=>'<option>'+d+'</option>').join("")+'</select></div>'+
      '<div class="field"><label>Адрес</label><input id="c_address" placeholder="улица, дом, квартира"></div>'+
      '<div class="field"><label>Срочность</label><select id="c_urgency">'+
        URGENCIES.map(u=>'<option>'+u+'</option>').join("")+'</select></div>'+
      '<div class="field"><label>Телефон</label><input id="c_phone" placeholder="+7 999 123-45-67" inputmode="tel" oninput="maskPhone(this)"></div>'+
      '<button class="btn primary" id="createBtn" onclick="doCreate()">Отправить заявку</button>';
  };

  window.doCreate = async function(){
    const problem = val("c_problem"), district = val("c_district"),
          address = val("c_address"), urgency = val("c_urgency"), phone = val("c_phone");
    const digits = phone.replace(/\D/g, "");
    if(problem.length < 3){ if(tg) tg.showAlert("Опишите проблему подробнее."); return; }
    if(address.length < 3){ if(tg) tg.showAlert("Укажите адрес."); return; }
    if(digits.length < 10){ if(tg) tg.showAlert("Введите корректный телефон."); return; }
    const btn = document.getElementById("createBtn");
    btn.textContent = "Отправляем…"; btn.disabled = true;
    try {
      await api("/create", { method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ initData, problem, district, address, urgency, phone }) });
      if(tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
      await loadList();
    } catch(e){ btn.textContent = "Ошибка, попробуйте снова"; btn.disabled = false; }
  };


  // Маска телефона: по мере ввода форматирует в +7 999 123-45-67
  function maskPhone(el){
    var d = el.value.replace(/\D/g, "");
    if(d.startsWith("8")) d = "7" + d.slice(1);
    if(!d.startsWith("7")) d = "7" + d;
    d = d.slice(0, 11);  // 7 + 10 цифр
    var rest = d.slice(1);
    var out = "+7";
    if(rest.length > 0) out += " " + rest.slice(0,3);
    if(rest.length >= 4) out += " " + rest.slice(3,6);
    if(rest.length >= 7) out += "-" + rest.slice(6,8);
    if(rest.length >= 9) out += "-" + rest.slice(8,10);
    el.value = out;
  }
  window.maskPhone = maskPhone;

  function val(id){ return document.getElementById(id).value.trim(); }
  loadList();
</script>
</body>
</html>
